<p class="text-red-500 font-bold">Parent Component From Parent</p>
<p class="">Parent Component Value : <span class="font-bold capitalize">{{userName()}}</span></p>
<p>UserList Are Below From Parent</p>
<div>
    <input [readOnly]="readOnly()" type="text"(input)="userInputValue.set($event.target.value)" placeholder="Enter UserName"
        class="border border-gray-400 rounded-sm p-1">
    &nbsp;&nbsp;
    <button
    (click)="addUser()"
     class="border p-1 rounded-sm cursor-pointer">Add User</button>
</div>
<ul>
    @for (item of userList(); track $index) {
    <li class="flex items-center gap-2">
        <span class="font-bold">{{$index+1}}.</span>
        <span class="capitalize">{{item}}</span>
    </li>
    }
</ul>
<hr class="my-2">
<div>
    <!-- <app-child-component [userName]="userName()" /> -->
    <p>UserList Are Below From Child</p>
    @for (item of userList(); track $index) {
    <app-child-component [userList]="item"></app-child-component>
    }
</div>
