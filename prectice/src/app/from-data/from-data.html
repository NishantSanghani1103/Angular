<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-lg shadow">
  <h2 class="text-2xl font-bold mb-6">User Registration</h2>
  <form (submit)="registerData($event)">
    <!-- Text -->
    <div class="mb-4">
      <label class="block mb-1 font-medium">Full Name</label>
      <input
        [formField]="registerForm.name"
        type="text"
        class="w-full border rounded px-3 py-2"
        placeholder="Enter your name"
      />
    </div>

    <!-- Email -->
    <div class="mb-4">
      <label class="block mb-1 font-medium">Email</label>
      <input
        [formField]="registerForm.email"
        type="email"
        class="w-full border rounded px-3 py-2"
        placeholder="Enter your email"
      />
    </div>

    <!-- Password -->
    <div class="mb-4">
      <label class="block mb-1 font-medium">Password</label>
      <input
        [formField]="registerForm.password"
        type="password"
        class="w-full border rounded px-3 py-2"
      />
    </div>

    <!-- Number -->
    <div class="mb-4">
      <label class="block mb-1 font-medium">Age</label>
      <input type="number" [formField]="registerForm.age" class="w-full border rounded px-3 py-2" />
    </div>

    <!-- Date -->
    <div class="mb-4">
      <label class="block mb-1 font-medium">Birth Date</label>
      <input type="date" class="w-full border rounded px-3 py-2" [formField]="registerForm.dob" />
    </div>

    <!-- Radio -->
    <div class="mb-4">
      <label class="block mb-2 font-medium">Gender</label>

      <label class="mr-4">
        <input type="radio" [formField]="registerForm.gender" value="Male" />
        Male
      </label>

      <label>
        <input type="radio" [formField]="registerForm.gender" value="Female" />
        Female
      </label>
    </div>

    <!-- Checkbox -->
    <div class="mb-4">
      <label>
        <input [formField]="registerForm.condition" type="checkbox" />
        Accept Terms & Conditions
      </label>
    </div>

    <!-- Select -->
    <div class="mb-4">
      <label class="block mb-1 font-medium">Country</label>
      <select [formField]="registerForm.country" class="w-full border rounded px-3 py-2">
        <option value="">Select Country</option>
        <option value="India">India</option>
        <option value="USA">USA</option>
        <option value="Canada">Canada</option>
      </select>
    </div>

    <!-- Textarea -->
    <div class="mb-4">
      <label class="block mb-1 font-medium">Address</label>
      <textarea
        [formField]="registerForm.address"
        rows="3"
        class="w-full border rounded px-3 py-2"
      ></textarea>
    </div>

    <button class="bg-blue-600 text-white px-4 py-2 rounded">Submit</button>
  </form>
</div>
