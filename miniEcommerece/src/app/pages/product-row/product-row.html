<div class="card shadow-sm border-0 h-100">
  <img [src]="pData.image" class="card-img-top" alt="" />
  <div class="card-body">
    <h6 class="fw-bold">{{pData.name}}</h6>
    <p class="text-muted mb-1">{{pData.category_name}}</p>
    <h6 class="fw-bold"> ₹ {{pData.price}}</h6>
    @if (!isInCart()) {
      <button (click)="addToCart()" class="btn btn-dark w-100 mt-2">
        Add To Cart
      </button>
    }
    @if (isInCart()) {
      <button (click)="removeFromCart()" class="btn btn-danger w-100 mt-2">
        Remove From Cart
      </button>
    }
  </div>
</div>
