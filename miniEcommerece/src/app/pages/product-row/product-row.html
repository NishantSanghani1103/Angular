<div class="card shadow-sm border-0 h-100">
  <img
    style="cursor: pointer"
    [routerLink]="['/product', pData.slug]"
    [src]="pData.imagesUrl[0]"
    class="card-img-top"
    alt=""
  />
  <div class="card-body">
    <h6 class="fw-bold">{{ pData.name }}</h6>
    <p class="text-muted mb-1">{{ pData.category.name }}</p>
    <h6 class="fw-bold">₹ {{ pData.price }}</h6>
    @if (!isInCart()) {
      <button
      [disabled]="checkCart()"
        [ngClass]="{
          'bg-danger text-white border-white': checkCart(),
        }"
        (click)="
          cart.addToCart({
            id: pData.id,
            quantity: 1,
            price: pData.price,
          })
        "
        class="btn btn-dark w-100 mt-2"
      >
        {{ checkCart() ? 'ADDED' : '    Add To Cart' }}
      </button>
    }
    @if (isInCart()) {
      <button (click)="removeFromCart()" class="btn btn-danger w-100 mt-2">Remove From Cart</button>
    }
  </div>
</div>
