<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-0 p-4">
        <h3 class="fw-bold text-center mb-4">Login</h3>

        <!-- Email -->
        <form (submit)="loginData()" [formGroup]="loginForm" action="">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input
              formControlName="email"
              type="email"
              class="form-control"
              placeholder="Enter email"
            />
            <app-validation-error [control]="f['email']" label="email"></app-validation-error>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input
              formControlName="password"
              type="password"
              class="form-control"
              placeholder="Enter password"
            />
            <app-validation-error [control]="f['password']" label="password"></app-validation-error>
          </div>

          <!-- Button -->
          <button [disabled]="loginForm.invalid" class="btn btn-dark w-100">Login</button>
        </form>
        <!-- Links -->
      </div>
    </div>
  </div>
</div>
