<div class="card">
  <div class="card-header d-flex justify-content-between">
    <h5>Products</h5>

    <button [routerLink]="['/admin/product/add']" class="btn btn-success">Add New</button>
  </div>

  <div class="card-body">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Image</th>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        @for (item of productData(); track item.id) {
          <tr app-product-rows (refresh)="getProduct()" [pData]="item" [index]="$index"></tr>
        }
      </tbody>
    </table>
  </div>
</div>
