<div class="card">
  <div class="card-header">Add Product</div>

  <div class="card-body">
    <form (submit)="productSave()" [formGroup]="productForm">
      <div class="mb-3">
        <label class="form-label"> Product Name </label>

        <input formControlName="name" type="text" class="form-control" />

        <app-validation-error [control]="f['name']" label="name"></app-validation-error>
      </div>

      <div class="mb-3">
        <label class="form-label"> Category </label>

        <select formControlName="categoryId" class="form-select">
          <option value="">--Select Category--</option>
          @for (item of categoryData(); track item.id) {
            <option [value]="item.id">{{ item.name }}</option>
          }
        </select>
        <app-validation-error [control]="f['categoryId']" label="categoryId"></app-validation-error>
      </div>

      <div class="mb-3">
        <label class="form-label"> Price </label>

        <input formControlName="price" type="number" class="form-control" />

        <app-validation-error [control]="f['price']" label="price"></app-validation-error>
      </div>

      <div class="mb-3">
        <label class="form-label"> Stock </label>

        <input formControlName="stock" type="number" class="form-control" />

        <app-validation-error [control]="f['stock']" label="stock"></app-validation-error>
      </div>
      <div class="mb-3">
        <label class="form-label"> Product Image </label>

        <input
          type="file"
          class="form-control"
          multiple
          accept="image/*"
          (change)="onImageSelect($event)"
        />
      </div>

      <div class="mb-3">
        <label class="form-label"> Description </label>

        <textarea formControlName="description" rows="4" class="form-control"></textarea>

        <app-validation-error
          [control]="f['description']"
          label="description"
        ></app-validation-error>
      </div>

      <button type="submit" class="btn btn-primary">Add Product</button>
    </form>
  </div>
</div>
