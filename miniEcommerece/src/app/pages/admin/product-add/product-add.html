<div class="card">
  <div class="card-header">
    Add Product
  </div>

  <div class="card-body">

    <form>

      <div class="mb-3">
        <label class="form-label">
          Product Name
        </label>

        <input
          type="text"
          class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">
          Category
        </label>

        <select class="form-select">
          <option>Electronics</option>
          <option>Fashion</option>
          <option>Books</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">
          Price
        </label>

        <input
          type="number"
          class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">
          Product Image
        </label>

        <input
          type="file"
          class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">
          Description
        </label>

        <textarea
          rows="4"
          class="form-control"></textarea>
      </div>

      <button class="btn btn-primary">
        Add Product
      </button>

    </form>

  </div>
</div>
