<div class="card">
  <div class="card-header">Order Management</div>

  <div class="card-body">
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Date</th>
          <th>Total</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        @for (item of orderData(); track item.id) {
          <tr>
            <td class="text-uppercase">#{{ item.id.split('-')[0] }}</td>
            <td class="text-capitalize">{{ item.user?.name }}</td>
            <td>{{ item.createdAt | date }}</td>
            <td>₹{{ item.totalAmount }}</td>

            <td>
              <span
                [ngClass]="{
                  'bg-danger': item.status == 'cancelled',
                  'bg-success': item.status == 'delivered',
                  'bg-warning': item.status == 'pending',
                  'bg-secondary': item.status == 'shipped',
                }"
                class="badge text-capitalize"
              >
                {{ item.status }}
              </span>
            </td>

            <td>
              <select
                (change)="changeOrderStatus(item.id, $event)"
                class="form-select form-select-sm"
              >
                <option value="pending" [selected]="item.status === 'pending'">Pending</option>
                <option value="shipped" [selected]="item.status === 'shipped'">Shipped</option>
                <option value="delivered" [selected]="item.status === 'delivered'">
                  Delivered
                </option>
                <option value="cancelled" [selected]="item.status === 'cancelled'">
                  Cancelled
                </option>
              </select>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
