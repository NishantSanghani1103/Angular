<div class="container-fluid py-4">
  <div class="row">
    <!-- FILTER SIDEBAR -->
    <div class="col-md-3 mb-4">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h5 class="fw-bold mb-3">Filters</h5>

          <!-- Category Filter -->
          <div class="mb-4">
            <h6 class="fw-bold">Category</h6>

            <div class="overflow-auto border rounded p-2" style="max-height: 250px">
              @for (item of categoryData(); track item.id) {
                <app-category-row
                  (categoryChangedValue)="categoryChange($event)"
                  [categoryData]="item"
                ></app-category-row>
              }
            </div>
          </div>

          <div class="mb-4">
            <h6 class="fw-bold">Brand</h6>

            <div class="overflow-auto border rounded p-2" style="max-height: 250px">
              @for (item of brandData(); track item.id) {
                <app-brand-row
                  (brandsChangedValue)="brandsChange($event)"
                  [brandsData]="item"
                ></app-brand-row>
              }
            </div>
          </div>

          <!-- Price Filter -->
          <div class="mb-2">
            <h6 class="fw-bold text-uppercase mb-3">Price</h6>

            <div class="border rounded p-3">
              <div class="form-check py-1">
                <input
                  (input)="priceChange([10, 250])"
                  class="form-check-input"
                  type="radio"
                  name="priceFilter"
                />
                <label class="form-check-label"> ₹10 - ₹250 </label>
              </div>

              <div class="form-check py-1">
                <input
                  (input)="priceChange([250, 500])"
                  class="form-check-input"
                  type="radio"
                  name="priceFilter"
                />
                <label class="form-check-label"> ₹250 - ₹500 </label>
              </div>

              <div class="form-check py-1">
                <input
                  (input)="priceChange([500, 1000])"
                  class="form-check-input"
                  type="radio"
                  name="priceFilter"
                />
                <label class="form-check-label"> ₹500 - ₹1000 </label>
              </div>

              <div class="form-check py-1">
                <input class="form-check-input" type="radio" name="priceFilter" />
                <label class="form-check-label"> ₹1000+ </label>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- PRODUCT GRID -->
    <div class="col-md-9">
      <!-- Top Bar -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0">Products</h4>

        <!-- <select class="form-select w-auto">
          <option>Sort by Latest</option>
          <option>Price Low to High</option>
          <option>Price High to Low</option>
          <option>Popular</option>
        </select> -->
      </div>
      @if (loading()) {
        <p>Loading....</p>
      } @else {
        <!-- Products -->
        <div class="row g-4">
          @for (item of productData(); track item.id) {
            <div class="col-lg-4 col-md-6">
              <app-product-row [pData]="item"></app-product-row>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
