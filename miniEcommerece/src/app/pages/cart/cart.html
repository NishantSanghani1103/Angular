<div class="container py-5">
  <h2 class="fw-bold mb-4">Shopping Cart</h2>

  <div class="row g-4">
    <!-- CART ITEMS -->
    <div class="col-md-8">
      <!-- Cart Item 1 -->

      @for (item of cart.cartItems(); track item.id) {

        <app-cart-row [item]="item"></app-cart-row>
      }
      <!-- Cart Item 2 -->
      @empty {
        <p>Cart Items Not Found...!!</p>
      }
      <!-- Continue Shopping -->
      <div class="mt-3">
        <button class="btn btn-outline-dark" [routerLink]="['/product']">← Continue Shopping</button>
      </div>
    </div>

    <!-- ORDER SUMMARY -->
    <div class="col-md-4">
      <div class="card shadow-sm border-0 p-3">
        <h5 class="fw-bold mb-3">Order Summary</h5>

        <div class="d-flex justify-content-between mb-2">
          <span>Subtotal</span>
           <span>₹ {{ total() }}</span>
          <!-- <span>₹ {{ cart.totalPrice() }}</span> -->
        </div>

        <div class="d-flex justify-content-between mb-2">
          <span>Shipping</span>
          <span>₹ 0</span>
        </div>

        <div class="d-flex justify-content-between mb-3">
          <span>Discount</span>
          <span class="text-success">₹ 0</span>
        </div>

        <hr />

        <div class="d-flex justify-content-between fw-bold mb-3">
          <span>Total</span>
          <span>₹ {{ total() }}</span>
        </div>

        <button [routerLink]="['/checkout']" class="btn btn-dark w-100 mb-2">Proceed to Checkout</button>

       
      </div>
    </div>
  </div>
</div>
