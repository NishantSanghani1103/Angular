<div class="card mb-3 shadow-sm border-0">
  <div class="row g-0 align-items-center">
    <div class="col-md-3">
      <img [src]="item.product.imagesUrl[0]" class="img-fluid rounded-start" alt="Product" />
    </div>

    <div class="col-md-9">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h5 class="fw-bold mb-1">{{ item.product.name }}</h5>

          <h6 class="fw-bold">₹ {{ item.productPrice }}</h6>
        </div>

        <div class="text-center">
          <div class="input-group mb-2" style="width: 120px">
            <button
              (click)="
                item.quantity > 1
                  ? changeCartQty(item.id, item.quantity - 1)
                  : removeFromCart(item.id)
              "
              class="btn btn-outline-secondary"
            >
              -
            </button>
            <input type="number" class="form-control text-center" [value]="item.quantity" />
            <button
              (click)="item.quantity < 9 && changeCartQty(item.id, item.quantity + 1)"
              class="btn btn-outline-secondary"
            >
              +
            </button>
          </div>

          <button (click)="removeFromCart(item.id)" class="btn btn-sm btn-danger">Remove</button>
        </div>
      </div>
    </div>
  </div>
</div>
