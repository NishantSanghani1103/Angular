<div class="card mb-3 shadow-sm border-0">
  <div class="row g-0 align-items-center">
    <div class="col-md-3">
      <img [src]="item.image" class="img-fluid rounded-start" alt="Product" />
    </div>

    <div class="col-md-9">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h5 class="fw-bold mb-1">{{ item.name }}</h5>

          <h6 class="fw-bold">₹ {{ item.price }}</h6>
        </div>

        <div class="text-center">
          <div class="input-group mb-2" style="width: 120px">
            <button
              (click)="cart.changeQty(item.id, 'decrement',item.qty)"
              class="btn btn-outline-secondary"
            >
              -
            </button>
            <input type="number" class="form-control text-center"  [value]="item.qty" />
            <button
              (click)="cart.changeQty(item.id, 'increment',item.qty)"
              class="btn btn-outline-secondary"
            >
              +
            </button>
          </div>

          <button (click)="cart.removeCart(item.id)" class="btn btn-sm btn-danger">Remove</button>
        </div>
      </div>
    </div>
  </div>
</div>
