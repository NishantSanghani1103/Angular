<nav class="navbar position-sticky top-0 z-3 navbar-expand-lg navbar-dark bg-dark px-3">
  <a
    class="navbar-brand fw-bold"
    routerLinkActive="active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    ShopZone
  </a>

  <button class="navbar-toggler" type="button">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse">
    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-3">
      <li class="nav-item">
        <a
          class="nav-link active"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLink="/home"
          >Home</a
        >
      </li>

      <li class="nav-item">
        <a
          class="nav-link"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLink="/product"
          >Products</a
        >
      </li>

      <li class="nav-item">
        <a
          class="nav-link"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLink="/orders"
          >Orders</a
        >
      </li>
    </ul>

    <form class="d-flex me-3">
      <input class="form-control me-2" type="search" placeholder="Search products..." />
      <button class="btn btn-outline-light" type="button">Search</button>
    </form>

    <div class="d-flex align-items-center text-white">
      @if (auth.user()) {
        <span (click)="auth.logOut()" class="me-3" style="cursor: pointer" routerLink="/"
          >LogOut</span
        >
      } @else {
        <span class="me-3" style="cursor: pointer" routerLink="/">LogIn</span>
      }
      <button routerLink="/cart" class="btn btn-warning position-relative">
        Cart
        <span
          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
        >
          {{ cart.cartItems().length }}
        </span>
      </button>
    </div>
  </div>
</nav>
