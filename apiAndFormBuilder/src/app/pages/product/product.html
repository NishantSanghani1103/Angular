       <div class="col-lg-3 col-md-6">
          <div class="card product-card border-0 shadow-sm h-100">
            <img [src]="item.thumbnail" class="card-img-top" alt="Product" />

            <div class="card-body">
              <span
                [ngClass]="{
                  'bg-danger': item.stock == 0,
                }"
                class="badge bg-success mb-2"
              >
                {{ item.stock == 0 ? 'Out Of' : 'In' }} Stock
              </span>

              <h5 class="card-title">{{ item.title }}</h5>

              <p class="text-muted small">{{ item.description }}</p>

              <div class="d-flex justify-content-between align-items-center">
                <h5 class="text-primary mb-0">₹ {{ item.price }}</h5>

                <button class="btn btn-outline-primary btn-sm">Add to Cart</button>
              </div>
            </div>
          </div>
        </div>
