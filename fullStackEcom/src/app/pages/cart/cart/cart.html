<div class="container py-5">

    <h2 class="mb-4">
        Shopping Cart
    </h2>

    <div class="card shadow-sm">

        <div class="card-body">

            <table class="table align-middle">

                <thead>

                    <tr>
                        <th>Image</th>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>

                        <td>
                            <img
                                src="https://via.placeholder.com/80"
                                class="rounded"
                            >
                        </td>

                        <td>iPhone 15</td>

                        <td>₹80,000</td>

                        <td>
                            <input
                                type="number"
                                class="form-control"
                                value="1"
                            >
                        </td>

                        <td>₹80,000</td>

                        <td>
                            <button class="btn btn-danger">
                                Remove
                            </button>
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

    <div class="text-end mt-4">

        <h3>
            Grand Total : ₹80,000
        </h3>

        <button class="btn btn-success btn-lg mt-2">
            Proceed To Checkout
        </button>

    </div>

</div>
