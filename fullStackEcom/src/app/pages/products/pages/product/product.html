<div class="container py-5">

    <div class="row">

        <!-- Filters -->

        <div class="col-lg-3">

            <div class="card shadow-sm mb-4">

                <div class="card-body">

                    <h4 class="mb-3">
                        Filters
                    </h4>

                    <h6>Categories</h6>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">
                            Mobile
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">
                            Laptop
                        </label>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox">
                        <label class="form-check-label">
                            Electronics
                        </label>
                    </div>

                    <h6>Price Range</h6>

                    <select class="form-select mb-4">
                        <option>All Prices</option>
                        <option>₹0 - ₹500</option>
                        <option>₹500 - ₹1000</option>
                        <option>₹1000+</option>
                    </select>

                    <h6>Search Product</h6>

                    <input
                        type="text"
                        class="form-control mb-4"
                        placeholder="Search..."
                    >

                    <h6>Sort By</h6>

                    <select class="form-select">
                        <option>Newest</option>
                        <option>Price Low To High</option>
                        <option>Price High To Low</option>
                    </select>

                </div>

            </div>

        </div>

        <!-- Products -->

        <div class="col-lg-9">

            <div class="row g-4">

                <div class="col-md-4">

                    <div class="card shadow-sm h-100">

                        <img
                            src="https://via.placeholder.com/300x250"
                            class="card-img-top"
                        >

                        <div class="card-body">

                            <h5>iPhone 15</h5>

                            <p class="text-muted">
                                Mobile
                            </p>

                            <h4 class="text-primary">
                                ₹80,000
                            </h4>

                            <button class="btn btn-dark w-100">
                                View Details
                            </button>

                        </div>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card shadow-sm h-100">

                        <img
                            src="https://via.placeholder.com/300x250"
                            class="card-img-top"
                        >

                        <div class="card-body">

                            <h5>MacBook Pro</h5>

                            <p class="text-muted">
                                Laptop
                            </p>

                            <h4 class="text-primary">
                                ₹1,20,000
                            </h4>

                            <button class="btn btn-dark w-100">
                                View Details
                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
