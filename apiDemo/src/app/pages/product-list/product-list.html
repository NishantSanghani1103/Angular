<div class="bg-white rounded-xl shadow hover:shadow-lg transition">
  <img
    [src]="productData.thumbnail"
    alt="Essence Mascara Lash Princess"
    class="w-full h-52 object-cover rounded-t-xl"
  />

  <div class="p-4">
    <span class="inline-block bg-blue-100 text-blue-600 text-xs px-2 py-1 rounded-full">
      {{ productData.category }}
    </span>
    <a  [routerLink]="['/product',productData.id]">
      <h2 class="text-lg font-semibold mt-3">{{ productData.title }}</h2>
    </a>
    <p class="text-gray-500 text-sm mt-2 line-clamp-2">
      {{ productData.description }}
    </p>

    <div class="flex items-center justify-between mt-4">
      <span class="text-xl font-bold text-gray-800"> $ {{ productData.price }} </span>

      <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">View</button>
    </div>
  </div>
</div>
