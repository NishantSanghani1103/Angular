<div class="container-fluid">

  <h2 class="mb-4">Dashboard</h2>

  <div class="row">

    <!-- Total Products -->
    <div class="col-md-4 mb-3">
      <div class="card bg-primary text-white">
        <div class="card-body">
          <h5>Total Products</h5>
          <h2>120</h2>
        </div>
      </div>
    </div>

    <!-- Total Orders -->
    <div class="col-md-4 mb-3">
      <div class="card bg-success text-white">
        <div class="card-body">
          <h5>Total Orders</h5>
          <h2>85</h2>
        </div>
      </div>
    </div>

    <!-- Total Users -->
    <div class="col-md-4 mb-3">
      <div class="card bg-danger text-white">
        <div class="card-body">
          <h5>Total Users</h5>
          <h2>45</h2>
        </div>
      </div>
    </div>

  </div>

  <!-- Recent Orders Table (Static) -->

    <div class="card-header">

    </div>

    <div class="card-body">

      <table class="table table-bordered">

        <thead>
          <tr>
            <th>Order Id</th>
            <th>Customer</th>
            <th>Status</th>
            <th>Amount</th>
          </tr>
        </thead>

        <tbody>

          <tr>
            <td>#101</td>
            <td>John Doe</td>
            <td>
              <span class="badge bg-success">Delivered</span>
            </td>
            <td>₹4,500</td>
          </tr>

          <tr>
            <td>#102</td>
            <td>Alex Smith</td>
            <td>
              <span class="badge bg-warning text-dark">Pending</span>
            </td>
            <td>₹2,200</td>
          </tr>

          <tr>
            <td>#103</td>
            <td>Maria</td>
            <td>
              <span class="badge bg-danger">Cancelled</span>
            </td>
            <td>₹1,800</td>
          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
