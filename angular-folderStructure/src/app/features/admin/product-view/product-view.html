<div class="card">
  <div class="card-header d-flex justify-content-between">
    <h5>Products</h5>

    <button class="btn btn-success">Add New</button>
  </div>

  <div class="card-body">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Image</th>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        @for (item of productData(); track item.id) {
          <tr>
            <td>{{ $index + 1 }}</td>
            <td>
              <img [src]="item.thumbnail" width="60" />
            </td>
            <td>{{ item.title }}</td>
            <td>{{ item.category }}</td>
            <td>₹ {{ item.price }}</td>
            <td>{{ item.stock }}</td>
            <td>
              <button (click)="editProduct(item.id)" class="btn btn-warning btn-sm me-2">
                Edit
              </button>
              <button (click)="deleteProduct(item.id)" class="btn btn-danger btn-sm">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>

    <!-- Pagination UI (Static) -->
   
  </div>
</div>
