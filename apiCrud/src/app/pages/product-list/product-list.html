<div class="min-h-screen bg-gray-100 py-10">
  <div class="max-w-7xl mx-auto px-4">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold text-gray-800">Product Management</h1>
        <p class="text-gray-500 mt-1">Manage all products from one place</p>
      </div>

      <button
        routerLink="products/add"
        class="mt-4 md:mt-0 bg-blue-600 cursor-pointer text-white px-5 py-3 rounded-lg hover:bg-blue-700 transition"
      >
        + Add Product
      </button>
    </div>

    <!-- Search -->
    <div class="bg-white p-4 rounded-xl shadow mb-8">
      <input
        type="text"
        placeholder="Search products..."
        class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Product Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Product Card -->
      @for (item of productData(); track $index) {
        <app-product-row
        (refresh)="getProduct()"
         [pData]="item"></app-product-row>
      }
    </div>
  </div>
</div>
