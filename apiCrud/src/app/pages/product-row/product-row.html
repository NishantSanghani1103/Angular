<div class="bg-white rounded-xl shadow hover:shadow-lg transition overflow-hidden">
  <a [routerLink]="['product/', pData.id]">
    <img [src]="pData.thumbnail" alt="iPhone 15 Pro" class="w-full h-56 object-cover" />
  </a>

  <div class="p-5">
    <div class="flex justify-between items-start">
      <h2 class="text-xl font-semibold text-gray-800">{{ pData.title }}</h2>

      <span class="bg-blue-100 text-blue-700 text-xs px-3 py-1 rounded-full">
        {{ pData.category }}
      </span>
    </div>

    <p class="text-gray-500 text-sm mt-3 line-clamp-2">
      {{ pData.description }}
    </p>

    <div class="mt-4 space-y-2">
      <div class="flex justify-between">
        <span class="text-gray-500">Brand</span>
        <span class="font-medium">{{ pData.brand }}</span>
      </div>

      <div class="flex justify-between">
        <span class="text-gray-500">Stock</span>
        <span class="font-medium text-green-600"> {{ pData.stock }} Available </span>
      </div>

      <div class="flex justify-between">
        <span class="text-gray-500">Rating</span>
        <span>⭐ {{ pData.rating }}</span>
      </div>
    </div>

    <div class="mt-5 flex items-center justify-between">
      <span class="text-2xl font-bold text-green-600"> ₹ {{pData.price}} </span>
    </div>

    <!-- Action Buttons -->
    <div class="mt-5 grid grid-cols-3 gap-2">
      <button class="bg-gray-800 text-white py-2 rounded-lg hover:bg-gray-900">View</button>

      <button
        [routerLink]="['products/edit', pData.id]"
        class="bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700"
      >
        Edit
      </button>

      <button
        (click)="pData.id && productDelete(pData.id)"
        class="bg-red-600 text-white py-2 rounded-lg hover:bg-red-700"
      >
        Delete
      </button>
    </div>
  </div>
</div>
